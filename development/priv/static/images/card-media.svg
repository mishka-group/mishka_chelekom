<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300" width="600" height="300" role="img" aria-label="Abstract mountain landscape at dusk">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="0.45" stop-color="#4338ca"/>
      <stop offset="0.8" stop-color="#7c3aed"/>
      <stop offset="1" stop-color="#db2777"/>
    </linearGradient>
    <linearGradient id="sun" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fde68a"/>
      <stop offset="1" stop-color="#fb923c"/>
    </linearGradient>
    <linearGradient id="ridge1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#312e81"/>
      <stop offset="1" stop-color="#1e1b4b"/>
    </linearGradient>
  </defs>

  <rect width="600" height="300" fill="url(#sky)"/>

  <!-- stars -->
  <g fill="#e0e7ff" opacity="0.85">
    <circle cx="70" cy="48" r="1.6"/>
    <circle cx="140" cy="30" r="1.1"/>
    <circle cx="210" cy="62" r="1.4"/>
    <circle cx="500" cy="40" r="1.6"/>
    <circle cx="548" cy="74" r="1.1"/>
    <circle cx="430" cy="34" r="1.2"/>
    <circle cx="360" cy="54" r="1.3"/>
  </g>

  <!-- sun -->
  <circle cx="300" cy="128" r="54" fill="url(#sun)"/>
  <circle cx="300" cy="128" r="54" fill="none" stroke="#fff7ed" stroke-opacity="0.25" stroke-width="10"/>

  <!-- back ridge -->
  <path d="M0 300 L0 198 L110 140 L210 200 L320 132 L430 196 L540 150 L600 178 L600 300 Z" fill="url(#ridge1)"/>
  <!-- front ridge -->
  <path d="M0 300 L0 248 L96 212 L200 256 L308 214 L416 258 L520 220 L600 246 L600 300 Z" fill="#0b1020" opacity="0.92"/>

  <!-- reflected glow on the water/foreground -->
  <rect y="276" width="600" height="24" fill="#db2777" opacity="0.18"/>
</svg>
