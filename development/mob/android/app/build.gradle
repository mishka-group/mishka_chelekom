plugins {
    id 'com.android.application'
    id 'kotlin-android'
}

// ── Mob path config ───────────────────────────────────────────────────────────
// Reads from android/local.properties, falls back to environment variables.
def localProps = new Properties()
def localPropsFile = rootProject.file('local.properties')
if (localPropsFile.exists()) localProps.load(localPropsFile.newDataInputStream())

// Upload-key signing for Play release builds. Loaded from android/keystore.properties
// (gitignored, holds the passphrases; generated by `mix mob.setup.google_play`).
// If absent (fresh clone / CI without secrets) release builds stay unsigned and
// Play rejects them; debug builds are unaffected.
def keystorePropsFile = rootProject.file('keystore.properties')
def keystoreProps = new Properties()
if (keystorePropsFile.exists()) keystoreProps.load(keystorePropsFile.newDataInputStream())

def mobOtpRelease     = localProps.getProperty('mob.otp_release',      System.getenv('MOB_ANDROID_OTP_RELEASE')      ?: '')
def mobOtpReleaseArm32 = localProps.getProperty('mob.otp_release_arm32', System.getenv('MOB_ANDROID_OTP_RELEASE_ARM32') ?: mobOtpRelease)
def mobOtpReleaseX86_64 = localProps.getProperty('mob.otp_release_x86_64', System.getenv('MOB_ANDROID_OTP_RELEASE_X86_64') ?: mobOtpRelease)
def mobDir             = localProps.getProperty('mob.mob_dir',           System.getenv('MOB_DIR')                       ?: '')

// Auto-detect ERTS version from the OTP release directory (arm64 is canonical).
def ertsVsn = new File(mobOtpRelease).listFiles()
    ?.find { it.name.startsWith('erts-') }?.name ?: 'erts-17.0'

android {
    namespace 'com.example.mishka_mob'
    compileSdk 35

    // Pin NDK to match the one that built the bundled OTP runtime.
    // libbeam.a embeds C++ stdlib symbols using a specific libc++ ABI
    // namespace. NDK 27 / clang 18 produces ne180000; NDK 25 / clang 14
    // produces ne140000. Mismatch fails to link with undefined
    // __cxa_* symbols. Bumping this requires rebuilding the OTP tarballs.
    ndkVersion '27.2.12479018'

    defaultConfig {
        applicationId "com.example.mishka_mob"
        minSdk 28
        targetSdk 35
        versionCode 1
        versionName "1.0"

        ndk { abiFilters 'arm64-v8a', 'armeabi-v7a', 'x86_64' }

        externalNativeBuild {
            cmake {
                arguments "-DANDROID_STL=c++_static",
                          "-DOTP_RELEASE=${mobOtpRelease}",
                          "-DOTP_RELEASE_ARM32=${mobOtpReleaseArm32}",
                          "-DOTP_RELEASE_X86_64=${mobOtpReleaseX86_64}",
                          "-DERTS_VSN=${ertsVsn}",
                          "-DMOB_DIR=${mobDir}"
            }
        }
    }

    externalNativeBuild {
        cmake {
            path "src/main/jni/CMakeLists.txt"
            version "3.22.1"
        }
    }

    buildFeatures {
        compose true
    }

    composeOptions {
        kotlinCompilerExtensionVersion '1.5.8'
    }

    kotlinOptions {
        jvmTarget = '1.8'
    }

    signingConfigs {
        release {
            if (keystorePropsFile.exists()) {
                storeFile     = rootProject.file(keystoreProps['storeFile'])
                storePassword = keystoreProps['storePassword']
                keyAlias      = keystoreProps['keyAlias']
                keyPassword   = keystoreProps['keyPassword']
            }
        }
    }

    packagingOptions {
        jniLibs {
            // The BEAM dlopens the app's lib<app>.so by absolute path and execs
            // inet_gethost/erl_child_setup/epmd as real processes — they must be
            // extracted to the filesystem. AGP defaults release App Bundles to
            // extractNativeLibs=false (libs stay packed in the APK), which makes
            // the BEAM's dlopen fail with "library not found" on a Play-installed
            // split. useLegacyPackaging=true forces extraction.
            useLegacyPackaging true
        }
    }

    buildTypes {
        release {
            minifyEnabled false
            if (keystorePropsFile.exists()) signingConfig signingConfigs.release
        }
        debug   { jniDebuggable true }
    }
}

dependencies {
    def composeBom = platform('androidx.compose:compose-bom:2024.02.00')
    implementation composeBom
    implementation 'androidx.compose.ui:ui'
    implementation 'androidx.compose.material3:material3'
    implementation 'androidx.compose.material:material-icons-extended'
    implementation 'androidx.compose.foundation:foundation'
    implementation 'androidx.compose.animation:animation'
    implementation 'androidx.activity:activity-compose:1.8.2'
    implementation 'io.coil-kt:coil-compose:2.6.0'

    // AppCompat (the mob_scanner plugin's activity extends AppCompatActivity;
    // kept in the template so its gradle merge stays a no-op)
    implementation 'androidx.appcompat:appcompat:1.6.1'

    // Biometric authentication

    // CameraX (camera preview in core; mob_camera/mob_scanner also declare
    // these in their manifests — set-union dedups).
    //
    // Pinned to 1.4.x for 16 KB page alignment. 1.3.4's
    // libimage_processing_util_jni.so was the only 4 KB-aligned native lib in
    // the APK, which trips Android 15's "not 16 KB compatible" warning; every
    // other lib (BEAM/OTP, our NIF) was already aligned. The mob_camera plugin
    // still injects 1.3.4 into the managed plugin-deps block below, but Gradle
    // resolves the conflict to the higher version declared here.
    implementation 'androidx.camera:camera-camera2:1.4.2'
    implementation 'androidx.camera:camera-lifecycle:1.4.2'
    implementation 'androidx.camera:camera-view:1.4.2'

    // ML Kit barcode scanning (QR scanner)

    // Media3 ExoPlayer (video playback)
    implementation 'androidx.media3:media3-exoplayer:1.3.1'
    implementation 'androidx.media3:media3-ui:1.3.1'
}
