<!doctype html>
<meta charset="utf-8" />
<title>chelekom outro</title>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link
  href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;600&family=JetBrains+Mono:wght@400;700&display=swap"
  rel="stylesheet"
/>

<!--
  Outro card. 2.6s.

  Deliberately quiet. The only motion is the rule drawing itself under the URL —
  the same left-to-right fill as the intro's slots, so the two cards read as one
  gesture rather than two separate designs. No logo animation, no QR block.
-->

<style>
  :root {
    --ink: #17131f;
    --paper: #f2ecf7;
    --signal: #b48ead;
    --live: #7bdcb5;
    --dim: #5c5170;
    --display: "Inter Tight", system-ui, sans-serif;
    --mono: "JetBrains Mono", ui-monospace, monospace;
  }


  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    width: 1280px;
    height: 720px;
    background: var(--ink);
    color: var(--paper);
    font-family: var(--display);
    display: grid;
    place-items: center;
    overflow: hidden;
  }

  .hf-wrap {
    display: grid;
    justify-items: center;
    gap: 22px;
  }

  .hf-eyebrow {
    font-family: var(--mono);
    font-size: 14px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--signal);
    opacity: 0;
    animation: rise 0.45s ease-out 0.15s forwards;
  }

  .hf-url {
    position: relative;
    font-family: var(--mono);
    font-size: 30px;
    font-weight: 400;
    color: var(--paper);
    padding-bottom: 16px;
    opacity: 0;
    animation: rise 0.5s cubic-bezier(0.2, 0.8, 0.3, 1) 0.32s forwards;
  }

  /* The one moving part. */
  .hf-url::after {
    content: "";
    position: absolute;
    left: 0;
    bottom: 0;
    height: 2px;
    width: 0;
    background: var(--live);
    animation: draw 0.85s cubic-bezier(0.3, 0.7, 0.2, 1) 0.75s forwards;
  }

  .hf-note {
    font-size: 18px;
    color: var(--dim);
    opacity: 0;
    animation: rise 0.45s ease-out 1.35s forwards;
  }

  @keyframes rise {
    from {
      opacity: 0;
      transform: translateY(10px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }
  @keyframes draw {
    to {
      width: 100%;
    }
  }

  /* Corner mark: the wordless logo, no URL — this is a copyright, not a CTA. */
  .hf-mark {
    position: absolute;
    top: 44px;
    left: 44px;
    width: 38px;
    height: 38px;
    color: var(--paper);
    opacity: 0.38;
  }
  .hf-mark svg {
    width: 100%;
    height: 100%;
    display: block;
  }
</style>

<div class="hf-mark" id="mark"></div>

<div class="hf-wrap">
  <div class="hf-eyebrow" id="eyebrow">Documentation</div>
  <div class="hf-url" id="url">mishka.tools/chelekom/docs/headless/otp-field</div>
  <div class="hf-note">Full API, attrs and slots</div>
</div>

<script>
  // The card is authored in a fixed 1280x720 coordinate space; scale it to the
  // recording viewport so one set of type sizes serves any output resolution.
  if (window.__SCALE) document.documentElement.style.zoom = String(window.__SCALE);

  const spec = window.__SPEC ?? {
    docsUrl: "https://mishka.tools/chelekom/docs/headless/otp-field",
  };
  // Strip the scheme — it is noise at 30px, and the domain is the point.
  url.textContent = (spec.docsUrl ?? "").replace(/^https?:\/\//, "");
  // The logo arrives as window.__LOGO from render-cards.mjs (inlined, so the
  // cards never hit the network) and is recoloured by CSS via currentColor.
  if (window.__LOGO && typeof mark !== "undefined") {
    mark.innerHTML =
      `<svg viewBox="${window.__LOGO.viewBox}" fill="currentColor" aria-hidden="true">${window.__LOGO.paths}</svg>`;
  }

  document.fonts.ready.then(() => document.body.setAttribute("data-ready", "1"));
</script>
